<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">CyberTab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/newtab.css" />
</head>
<body>

  <!-- ══ WALLPAPER ══ -->
  <div id="wallpaper-wrap">
    <canvas id="bg-canvas"></canvas>
    <video id="bg-video" autoplay loop muted playsinline style="display:none;"></video>
    <img   id="bg-gif"                                       style="display:none;" alt="" />
    <img   id="bg-img"                                       style="display:none;" alt="" />
  </div>
  <div class="overlay"></div>
  <div class="scanlines"></div>

  <!-- ══ TOP BAR ══ -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="site-title glitch" data-text="CYBERTAB">CYBERTAB</span>
    </div>
    <nav class="topbar-nav" id="top-nav"></nav>
    <div class="topbar-right">
      <!-- Google Apps waffle -->
      <button class="tb-icon-btn" id="apps-btn" title="Google Apps">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M6.5 6.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm7 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm7 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm-14 7a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm7 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm7 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm-14 7a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm7 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm7 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/>
        </svg>
      </button>
      <!-- Profile button -->
      <button class="tb-profile-btn" id="profile-btn" title="Google Account">
        <span id="profile-initial">?</span>
      </button>
      <!-- Settings gear -->
      <button class="settings-btn" id="settings-btn" title="CyberTab Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="3.2"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ══ LEFT PANEL — Hello / Clock / Date (vertically centered) ══ -->
  <div class="left-panel" id="left-panel">
    <div class="lp-greeting">Hello, <span id="user-name">Coder</span></div>
    <div class="lp-clock"    id="clock">12:00 AM</div>
    <div class="lp-date"     id="date-display">Loading...</div>
  </div>

  <!-- ══ MAIN CENTER CONTENT ══ -->
  <main class="main-content">

    <!-- Quote widget top-right area -->
    <div class="quote-widget" id="quote-widget">
      <div class="qw-decor">"</div>
      <p class="qw-text"   id="qw-text">Loading quote...</p>
      <p class="qw-author" id="qw-author">— ...</p>
      <button class="qw-refresh" id="qw-refresh" title="Next quote">↻</button>
    </div>

    <!-- Search Bar -->
    <section class="search-section">
      <div class="search-container">
        <div class="search-engine-badge">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
        </div>
        <input type="text" id="search-input" class="search-input" placeholder="Search the web..." autocomplete="off" spellcheck="false" />
        <button class="search-btn" id="search-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <select id="search-engine" class="search-engine-select">
          <option value="https://www.google.com/search?q=">Google</option>
          <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
          <option value="https://www.bing.com/search?q=">Bing</option>
          <option value="https://search.yahoo.com/search?p=">Yahoo</option>
        </select>
      </div>
    </section>

    <!-- MODE 1: Unlimited Grid -->
    <section class="links-section" id="mode1-section">
      <div class="links-grid" id="links-grid"></div>
    </section>

    <!-- MODE 2: Bento 7-tile Grid -->
    <section class="links-section" id="mode2-section" style="display:none;">
      <div class="bento-grid" id="bento-grid"></div>
    </section>

  </main>

  <!-- ══ TICKER ══ -->
  <div class="ticker-bar" id="ticker-bar">
    <span class="ticker-label">[ SYS ]</span>
    <div class="ticker-track">
      <span class="ticker-content">◈ Developed by passionate developer Tayyab Khan ◈ Developed by passionate developer Tayyab Khan ◈ Developed by passionate developer Tayyab Khan ◈ Developed by passionate developer Tayyab Khan ◈</span>
    </div>
  </div>

  <script src="js/db.js"></script>
  <script src="js/newtab.js"></script>
</body>
</html>
